; PlatformIO Project Configuration File
;
;   pio run -e main             build main panel firmware (NAME=EPM_main, VERSION=1, CONF_VERSION=0)
;   pio run -e sub              build sub  panel firmware (NAME=EPM_sub,  VERSION=2, CONF_VERSION=2)
;   pio run -e espota_main -t upload   OTA the main-panel build to EPM_main
;   pio run -e espota_sub  -t upload   OTA the sub-panel  build to EPM_sub
;
; netname lives per-variant env (not in [common]) so each board class has its
; identity in one place. Unqualified `${netname}` in [common] does NOT
; interpolate to the env that includes common.build_flags -- PIO requires
; the explicit `${env:main.netname}` form (tested 2026-05).
;
; To build both at once on `pio run`: set default_envs = main, sub.

[platformio]
default_envs = main

[common]
build_flags = -std=gnu++17 -DDO_OTA=1 -DNO_STL=1 -DAVP_RAM_ATTR=IRAM_ATTR
     -mtext-section-literals
build_unflags = -std=gnu++11

[env:nodemcu]
; base env -- not built directly; extended by main/sub below.
platform = espressif8266
board = nodemcu
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
monitor_speed = 115200
upload_port = COM13
monitor_port = COM13
upload_speed = 921600
build_src_filter = +<*>
monitor_filters = esp8266_exception_decoder
; Critical for ESP8266 nodemcu reset: stop pio device monitor from holding DTR/RTS
monitor_dtr = 0
monitor_rts = 0
lib_deps =
  madpilot/mDNSResolver@^0.3

[env:main]
extends = env:nodemcu
netname = EPM_main
build_flags = ${common.build_flags} -DNAME=\"${env:main.netname}\" -DVERSION=1 -DCONF_VERSION=0 -O3
build_unflags = ${common.build_unflags}

[env:sub]
extends = env:nodemcu
netname = EPM_sub
build_flags = ${common.build_flags} -DNAME=\"${env:sub.netname}\" -DVERSION=2 -DCONF_VERSION=2 -O3
build_unflags = ${common.build_unflags}

[env:espota_main]
extends = env:main
upload_protocol = espota
upload_port = ${env:main.netname}

[env:espota_sub]
extends = env:sub
upload_protocol = espota
upload_port = ${env:sub.netname}
