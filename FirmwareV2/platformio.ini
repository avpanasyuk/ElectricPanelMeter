; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcu

[common]
netname = EPM_main
build_flags = -std=gnu++17 -DDO_OTA=1 -DNO_STL=1 -DNAME=\"${common.netname}\" -DAVP_RAM_ATTR=IRAM_ATTR
     -mtext-section-literals -DVERSION=1
build_unflags = -std=gnu++11

[env:nodemcu]
platform = espressif8266
board = nodemcu
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
monitor_speed = 115200
upload_port = COM13
monitor_port = COM13
upload_speed = 921600
build_flags = ${common.build_flags} -O3
build_unflags = ${common.build_unflags}
build_src_filter = +<*>
monitor_filters = esp8266_exception_decoder
; Critical for ESP8266 nodemcu reset: stop pio device monitor from holding DTR/RTS
; (otherwise opening the port toggles RST and the chip looks like it's bootlooping)
monitor_dtr = 0
monitor_rts = 0

[env:espota]
extends = env:nodemcu
upload_protocol = espota
upload_port = ${common.netname}
